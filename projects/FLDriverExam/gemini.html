        }

            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question h3 {
            margin-top: 0;
            color: #333;
        }

            display: block;
            margin: 8px 0;
            padding: 10px;
            background-color: #e9e9e9;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

            background-color: #dcdcdc;
        }

            margin-right: 10px;
        }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .feedback.wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .explanation {
            margin-top: 5px;
            font-size: 0.9em;
            color: #555;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s ease;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }
        .results h3 {
            margin-top: 0;
        }
    </style>
</head>

        let shuffledQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let wrongAnswers = 0;
        let quizStartTime;
        let quizEndTime;
        let quizActive = false;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; // Swap elements
            }
            return array;
        }

        function generateChoices(correctAnswer) {
            const choices = [correctAnswer];
            while (choices.length < 4) {
                // Generate simple placeholder incorrect answers
                const dummyChoice = `Option ${String.fromCharCode(65 + Math.floor(Math.random() * 26))} ${Math.floor(Math.random() * 1000)}`;
                if (!choices.includes(dummyChoice)) {
                    choices.push(dummyChoice);
                }
            }
            return shuffleArray(choices);
        }

        function buildQuiz() {
            shuffledQuestions = shuffleArray([...questions]);
            const output = [];

            shuffledQuestions.forEach((currentQuestion, index) => {
                const choices = generateChoices(currentQuestion.answer);
                const choicesHtml = choices.map((choice, choiceIndex) =>
                    `<label>
                        <input type="radio" name="question${index}" value="${choice}">
                        ${choice}
                    </label>`
                ).join('');

                output.push(
                    `<div class="question" id="question-${index}">
                        <h3>Question ${index + 1}: ${currentQuestion.question}</h3>
                        <div class="choices">${choicesHtml}</div>
                        <div class="feedback" style="display:none;"></div>
                        <div class="explanation" style="display:none;">${currentQuestion.explanation}</div>
                    </div>`
                );
            });

            document.getElementById('quiz').innerHTML = output.join('');
            addEventListeners();
            quizStartTime = new Date();
            quizActive = true;
        }

        function addEventListeners() {
            document.querySelectorAll('.choices input[type="radio"]').forEach(input => {
                input.addEventListener('change', handleAnswer);
            });
        }

        function handleAnswer(event) {
            if (!quizActive) return;

            const selectedInput = event.target;
            const questionElement = selectedInput.closest('.question');
            const feedbackElement = questionElement.querySelector('.feedback');
            const explanationElement = questionElement.querySelector('.explanation');
            const questionIndex = parseInt(questionElement.id.replace('question-', ''));
            const correctAnswer = shuffledQuestions[questionIndex].answer;
            const selectedAnswer = selectedInput.value;

            // Disable all radio buttons for this question
            questionElement.querySelectorAll('input[type="radio"]').forEach(input => {
                input.disabled = true;
                // Highlight the correct answer
                if (input.value === correctAnswer) {
                     input.closest('label').style.fontWeight = 'bold';
                     input.closest('label').style.color = '#155724';
                }
            });


            if (selectedAnswer === correctAnswer) {
                feedbackElement.textContent = "Correct!";
                feedbackElement.className = 'feedback correct';
                score++;
            } else {
                feedbackElement.textContent = "Wrong!";
                feedbackElement.className = 'feedback wrong';
                wrongAnswers++;
                // Indicate the chosen wrong answer
                 selectedInput.closest('label').style.color = '#721c24';
                 selectedInput.closest('label').style.fontWeight = 'bold';

                explanationElement.style.display = 'block'; // Show explanation
            }
             feedbackElement.style.display = 'block'; // Show feedback


        }

        function showResults() {
            quizEndTime = new Date();
            quizActive = false;

            const totalQuestions = questions.length;
            const timeTaken = ((quizEndTime - quizStartTime) / 1000).toFixed(2); // Time in seconds

            document.getElementById('score').textContent = `Correct: ${score} | Wrong: ${wrongAnswers} | Total: ${totalQuestions}`;
            document.getElementById('time').textContent = `Time Taken: ${timeTaken} seconds`;
            document.getElementById('results').style.display = 'block';
            document.getElementById('submit').style.display = 'none'; // Hide submit button

            // Scroll to the top to show results
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Build quiz on page load
        document.addEventListener('DOMContentLoaded', buildQuiz);

        // Add event listener for the submit button
        document.getElementById('submit').addEventListener('click', showResults);

    </script>
