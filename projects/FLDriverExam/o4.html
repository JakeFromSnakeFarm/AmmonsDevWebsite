    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
    }
    shuffle(questionBank);

    const quizEl = document.getElementById("quiz");
    const startTime = Date.now();

    // Render each question
    questionBank.forEach((q, i) => {
      const qDiv = document.createElement("div");
      qDiv.className = "question";
      qDiv.innerHTML = `<p><strong>Question ${i+1}:</strong> ${q.question}</p>`;
      
      const choicesDiv = document.createElement("div");
      choicesDiv.className = "choices";
      q.choices.forEach((c, idx) => {
        choicesDiv.innerHTML += `
          <label>
            <input type="radio" name="q${i}" value="${idx}">
            ${c}
          </label>`;
      });
      qDiv.appendChild(choicesDiv);

      // feedback placeholder
      const feedbackDiv = document.createElement("div");
      feedbackDiv.className = "feedback";
      feedbackDiv.id = `feedback${i}`;
      qDiv.appendChild(feedbackDiv);

      // add change listeners for real-time feedback
      choicesDiv.querySelectorAll(`input[name="q${i}"]`)
        .forEach(input => {
          input.addEventListener("change", () => {
            const selected = parseInt(input.value, 10);
            const fb = document.getElementById(`feedback${i}`);
            if (selected === q.correctAnswer) {
              fb.innerHTML = `<span class="correct">✔ Correct!</span>`;
            } else {
              fb.innerHTML = `
                <span class="wrong">✖ Wrong.</span><br>
                <strong>Answer:</strong> ${q.choices[q.correctAnswer]}<br>
                <em>${q.explanation}</em>
              `;
            }
          });
        });

      quizEl.appendChild(qDiv);
    });

    // Submit button only shows final tally & time
    document.getElementById("submitBtn").addEventListener("click", () => {
      let correctCount = 0;
      questionBank.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (sel && parseInt(sel.value, 10) === q.correctAnswer) {
          correctCount++;
        }
      });
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = `
        <h3>You got ${correctCount} of ${questionBank.length} correct.</h3>
        <p>Time elapsed: ${elapsed} seconds.</p>
      `;
    });
