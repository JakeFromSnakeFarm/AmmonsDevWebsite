<html>
<canvas id="can" height = "800" width = "800"></canvas>
<script>
	const c = document.getElementById("can"), ctx = c.getContext("2d");
	class Walker {
		constructor(x,y,r) {
			this.x = x;
			this.y = y;
			this.r = r;
		}

		meander(upperBound) {
			if(Math.round(Math.sqrt( Math.pow(this.x-(c.width/2),2) + Math.pow(this.y-(c.height/2),2) ) ) > upperBound ) {
				this.temp = randomDonut(upperBound-200);
				this.x = this.temp.x;
				this.y = this.temp.y;
			} else {
				if(Math.random()>0.5) {
					this.x += 1;
				} else {
					this.x -= 1;
				}
				if(Math.random()>0.5) {
					this.y += 1;
				} else {
					this.y -= 1;
				}
			}
		}

		show() {
			ctx.fillStyle = "rgb(255,0,0)"
			ctx.beginPath();
			ctx.arc(this.x,this.y,this.r,0,Math.PI*2,false)
			ctx.fill();
		}
	}
	var structure = [], walkers = [], radius = 3, maxDistFromO = 0;;
	setup();
	setInterval(function(){update()}, 1);

	function randomDonut(distFromO) {
		let rnd = random(0,Math.PI*2), r = random(distFromO+50,distFromO+200);
		ctx.arc(c.width/2,c.height/2,distFromO+50,0,Math.PI*2,false)
		ctx.arc(c.width/2,c.height/2,distFromO+200,0,Math.PI*2,false)
		ctx.stroke();
		return {x:c.width/2+(Math.cos(rnd)*r),y:c.height/2+(Math.sin(rnd)*r)}
	}

	function setup() {
		for(let i=0;i<120;i++) {
			coords = randomDonut(maxDistFromO)
			walkers[i] = new Walker(coords.x,coords.y,radius)
		}

		structure[0] = new Walker(c.width/2,c.height/2,radius+10)
	}

	function update() {
		ctx.fillStyle = "rgb(255,255,255)"
		ctx.fillRect(0,0,c.width,c.height)
		let structureFound = false;
		for(let i=0;i<walkers.length;i++) {
			for(let j=0;j<10;j++) {
				walkers[i].meander(maxDistFromO+200)

				for(let k=0;k<structure.length;k++) {
					if(Math.sqrt(Math.pow(walkers[i].x-structure[k].x,2)+Math.pow(walkers[i].y-structure[k].y,2)) < radius*2) {
						let sLength = structure.length;
						structure[sLength] = walkers.splice(i,1)[0];
						let strucFromO = Math.round(Math.sqrt(Math.pow(structure[sLength].x-(c.width/2),2)+Math.pow(structure[sLength].y-(c.height/2),2)));
							if(strucFromO > maxDistFromO) {
						 		maxDistFromO = strucFromO;
							}
						let coords = randomDonut(maxDistFromO);
						walkers[walkers.length] = new Walker(coords.x,coords.y,radius)
					}
				}
		}
			walkers[i].show()
		}
		for(let i=0;i<structure.length;i++) {
			structure[i].show()
		}
		//window.requestAnimationFrame(update)
	}

	function random(min,max,round) {
		if(round==null||round){
			this.value = Math.round(Math.random()*(max-min))+min;
		}else{
			this.value = Math.random()*(max-min)+min;
		}
		return this.value;
	}
</script>
</html>
