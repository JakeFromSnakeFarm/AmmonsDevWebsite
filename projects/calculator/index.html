<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		.graph {
			position: relative;
			width: 600px;
			height: 300px;
			border: 3px solid #666;
			background-color: #ddd;
			margin-bottom: 1em;
		}
		.graph * {
			transition: 1s ease-in-out;
		}
		.red {
			position: absolute;
			display: block;
			width: 100%;
			height: 50%;
			background-color: #cb2424;
			z-index: 10;
		}
		.green {
			position: absolute;
			display: block;
			right: 0;
			width: 50%;
			height: 100%;
			background-color: #77dd77;
			z-index: 5;
		}
		.blue {
			position: absolute;
			display: block;
			width: 100%;
			height: 100%;
			background-color: #007EA7;
			z-index: 1;
		}
		.ball {
			position: absolute;
			width: 16px;
			height: 16px;
			border-radius: 10px;
			left: 0;
			top: 0;
			background-color: #eee;
			z-index: 11;
		}
		.slideContainer {
			display: flex;
			width: 606px;
			flex-direction: column;
		}

		.slideContainer > * {
			padding: 1em 0;
			font-size: 1.3em;
/*			border-bottom: 1px solid gray;*/
		}

		input {
			font-size: 1em;
		}

		.slideContainer:nth-child(odd) {
			display: none;
		}
		.numberRow {
			width: 100%;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.numberRow input {
/*			border: none;
			text-align: center;*/
			height: 1.8em;
		}
		.numberRow label {
			padding: 4px;
		}
		.mainBox {
			margin: auto;
			display: table;
			background-color: #fff;
		}

		.results {
			padding: 2em 0;
			width: 606px;
			font-size: 1.3em;
			text-align: center;
		}
	</style>
</head>
<body>
	<div class="mainBox">
		<div class="graph">
			<div class="ball"></div>
			<div class="red"></div>
			<div class="blue"></div>
			<div class="green"></div>
		</div>
		<div class="slideContainer">
			<select id="models">
				<option value="4030">Whirpool</option>
				<option value="6510">Samsung</option>
				<option value="8050">LG</option>
			</select>
			<div class="numberRow"><label for="uP">Repair Price</label><input name="uP" type="number" min="0" max="1000" value="250" class="slider" id="unitPrice"></div>
			<div class="numberRow"><label for="rP">Unit Price</label><input name="rP" type="number" min="0" max="1000" value="50" class="slider" id="repairPrice"></div>
			<input name="" type="button" name="calc" value="Calculate" onclick="updateBall()">
		</div>
		<div class="results">
			<b>Replace Unit</b>
		</div>
	</div>
</body>
<script type="text/javascript">
	var red = document.getElementsByClassName("red")[0];
	var blue = document.getElementsByClassName("blue")[0];
	var green = document.getElementsByClassName("green")[0];
	var ball = document.getElementsByClassName("ball")[0];
	var unitPrice = document.getElementById("unitPrice");
	var repairPrice = document.getElementById("repairPrice");
	var modelName = document.getElementById("models");
	var results = document.getElementsByClassName("results")[0];

	function updateBall() {
		ball.style.top = 300-(Math.floor(unitPrice.value/3.33))+"px";
		ball.style.left = (Math.floor(repairPrice.value/1.66)-16)+"px";
		red.style.height = modelName.value[0]+modelName.value[1]+"%";
		green.style.width = modelName.value[2]+modelName.value[3]+"%";
		if((unitPrice.value/10)+(modelName.value[0]+modelName.value[1]-0) > 100) {
			console.log("replace")
			results.innerHTML = "<b>Replace Unit</b>";
			results.style.backgroundColor = "#cb2424"
		} else if((repairPrice.value/10)+(modelName.value[2]+modelName.value[3]-0) > 100) {
			console.log("repair")
			results.innerHTML = "<b>Repair Unit</b>";
			results.style.backgroundColor = "#77dd77"
		} else {
			console.log("consider")
			results.innerHTML = "<b>Consider Replacement</b>";
			results.style.backgroundColor = "#007EA7"
		}
	}
</script>
</html>
