<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Client and Appliance Information</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #cfcfcf;
            padding: 20px;
            color: #000;
        }
        h1 {
            color: #000;
        }
        form {
            max-width: 800px;
            margin: 20px auto;
        }

        form > div > * {
            height: 60px;
        }
        form > div > img {
            margin-right: 10px;
        }

        form > div {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        input[type="text"], input[type="email"], input[type="datetime-local"],textarea, select {
            width: 100%;
            max-width: 800px;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 4px;
            transition: border-color 0.3s;
            font-size: large;
        }
        input[type="datetime-local"] {
            -webkit-appearance: none;
        }
        input[type="text"]:focus, input[type="email"]:focus, textarea:focus, select:focus {
            border-color: #0056b3;
        }

        .button {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 3px solid #0056b3;
            font-size: large;
        }

        .submit {
            background-color: #007bff;
            color: white;
        }
        .reprompt {
            background-color: #999;
            border-color: #888;
            color: white;
        }
        .submit:hover {
            background-color: #0056b3;
        }
        .reprompt:hover {
            background-color: #888;
        }

        ::placeholder {
            color: black;
            font-style: bold;
            font-size: large;
            opacity: 1; /* Firefox */
        }

        .incomingContainer {
            max-width: 100%;
            display: flex;
            flex-wrap: wrap;

        }

        .incomingItemContainer {
            max-width: 300px;
            margin: 15px;
            display: flex;
            flex-direction: column;
        }

        .incomingItem {
            max-width: 300px;
            max-height: 200px;
            width: 300px;
            height: 200px;
            border-radius: 15px;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            border: 7px solid #fafafa;
        }

        .incomingItem:hover {
            background-color: #fafafa;
            border-color: #aaa;
        }

        .deleteButton {
            margin-top: 10px;
            text-decoration: underline;
            text-align: center;
            background-color: #999;
            border-color: #888;
            color: white;
        }
        .deleteButton:hover {
            font-weight: bold;
            background-color: #888;
        }
    </style>
</head>

<body>
    <h1>Client Information Form</h1>
    <div class="form-container">
        <form id="dataForm">
            <div class=""><img src="./img/user.png"><input type="text" name="clientName" placeholder="Client Name" required><input type="text" name="clientLastName" placeholder="Client Last Name"></div>
            <div class=""><img src="./img/call.png"><input type="text" name="clientPhoneNumber" placeholder="Client Phone Number" required></div>
            <div class=""><img src="./img/home.png"><input type="text" name="clientAddress" placeholder="Client Address" required></div>
            <div class=""><img src="./img/notepad.png"><textarea name="gateCode" placeholder="Gate Code/User Notes"></textarea></div>
            <div class=""><img src="./img/laundry.png"><input type="text" name="applianceType" placeholder="Appliance Type" oninput="updatePromptMadlib()"></div>
            <div class=""><img src="./img/tag.png"><input type="text" name="applianceBrandName" placeholder="Appliance Brand Name" oninput="updatePromptMadlib()" required></div>
            <div class=""><img src="./img/barcode-scanner.png"><input type="text" name="applianceModelNumber" placeholder="Appliance Model Number" oninput="updatePromptMadlib()" required></div>
            <!-- GPT PROMPT TO PERPLEXITY -->
            <div class=""><img src="./img/command-line.png"><textarea name="appliancePrompt" id="appliancePrompt" placeholder="Symptoms" style="height: 100px;"></textarea></div>
            <button class="reprompt button" type="button" onclick="submitReprompt()">Re-Prompt Synopsis</button>
            <!-- PPLX RESPONSE -->
            <div class=""><img src="./img/faq.png"><textarea name="applianceSynopsis" placeholder="Appliance Synopsis" style="height: 150px;"></textarea></div>
            <div class=""><img src="./img/calendar-date.png"><input type="datetime-local" name="jobDateTime" placeholder="Job Date and Time" required></div>
            <div class=""><img src="./img/notepad.png"><textarea name="repairNotes" placeholder="Repair Notes"></textarea></div>
            <button class="submit button" type="button" onclick="submitData()">Submit</button>
        </form>
    </div>
    <div class="incomingContainer" id="incomingContainer"></div>
    <script>
    var incomingObjects;
    const container = document.getElementById("incomingContainer");
    const formChildren = document.getElementById("dataForm").children;

    function updatePromptMadlib() {
        //Im having issue with my [Brand Name] [Appliance Type] [Model Number] it is [Symptoms]
        let brandName = formChildren[5].children.applianceBrandName.value == "" ? "[Brand Name]" : formChildren[5].children.applianceBrandName.value;
        let applianceType = formChildren[4].children.applianceType.value == "" ? "[Appliance]" : formChildren[4].children.applianceType.value;
        let applianceModelNumber = formChildren[6].children.applianceModelNumber.value == "" ? "[Model Number]" : formChildren[6].children.applianceModelNumber.value;

        formChildren[7].children.appliancePrompt.value = "Im having issues with my " + brandName + " " + applianceType + " " + applianceModelNumber + ". It is [Symptoms]. What is  the cause and how do I fix this?";
    }

    $.fn.serializeObject = function() {
        let o = {};
        let a = this.serializeArray();
        $.each(a, function() {
            if (o[this.name]) {
                if (!o[this.name].push) {
                    o[this.name] = [o[this.name]];
                }
                o[this.name].push(this.value || '');
            } else {
                o[this.name] = this.value || '';
            }
        });
        return o;
    };

    function fetchData() {
        $.get('fetchJSON.php', function(data) {
            incomingObjects = data;
            container.innerHTML = "";
            displayData();
        });
    }

    function displayData() {
        for (let i = 0; i < incomingObjects.length; i++) {
            let sendName = incomingObjects[i].name == null ? "Null" : incomingObjects[i].name
            createIncomingItem(sendName, incomingObjects[i].phone, i)
        }
    }

    function submitReprompt() {
        let temp = $('#dataForm').serializeObject();
        formChildren[9].children.applianceSynopsis.value = "Loading... Please wait a few seconds";
        $.post('./submit.php', JSON.stringify(temp), function(response) {
            temp = response.message;
            console.log(temp);
            console.log(response.messages)
        }, 'json');
    }

    function submitData() {
        let tempObj = $('#dataForm').serializeObject();
        tempObj.endTime = tempObj.jobDateTime.substring(0, 11) + (parseInt(tempObj.jobDateTime.substring(11, 13)) + 2) + tempObj.jobDateTime.substring(13);
        tempObj.applianceSynopsis = tempObj.applianceSynopsis.replaceAll(`"`, `'`);
        $.post('./submit.php', JSON.stringify(tempObj), function(response) {
            console.log(response);
        }, 'json');
        document.getElementById("dataForm").reset()
        alert("Data submitted");
    }

    function populateForm(index) {
        formChildren[0].children.clientName.value = incomingObjects[index].name == null ? "Null" : incomingObjects[index].name;
        formChildren[1].children.clientPhoneNumber.value = incomingObjects[index].phone;
        formChildren[2].children.clientAddress.value = incomingObjects[index].address;
        formChildren[4].children.applianceType.value = incomingObjects[index].appliance;
        formChildren[5].children.applianceBrandName.value = incomingObjects[index].brand;
        formChildren[6].children.applianceModelNumber.value = incomingObjects[index].modelNumber;
        formChildren[9].children.applianceSynopsis.value = incomingObjects[index].synopsis;
        formChildren[7].children.appliancePrompt.value = incomingObjects[index].initialPrompt;
        updatePromptMadlib();
        // formChildren.jobDateTime = x[index].bookingDate;
        //'2024-08-08T11:00'
    }

    function createIncomingItem(name, number, index) {
        let newContainer = document.createElement("div");
        let newDiv = document.createElement("div");
        let newHeading = document.createElement("h1");
        let newText = document.createElement("p");
        let deleteButton = document.createElement("div");
        deleteButton.classList.add("deleteButton");
        deleteButton.classList.add("button")
        deleteButton.setAttribute("onclick", "deleteItem(" + index + ");");
        //deleteButton.addEventListener("click", deleteItem(index));
        deleteButton.innerHTML = "Delete";
        newDiv.setAttribute("index", index);
        newDiv.classList.add("incomingItem");
        newDiv.setAttribute("onclick", "populateForm(" + index + ");");
        //newDiv.addEventListener("click", populateForm(index));
        newHeading.innerHTML = name;
        newText.innerHTML = number;
        newDiv.appendChild(newHeading);
        newDiv.appendChild(newText);
        newContainer.classList.add("incomingItemContainer");
        newContainer.appendChild(newDiv);
        newContainer.appendChild(deleteButton);
        container.appendChild(newContainer);
    }

    function deleteItem(index, event) {
        //event.stopPropagation();
        if (window.confirm("Are you sure you want to delete this item?")) {
            console.log("delete " + index)
            incomingObjects.splice(index, 1);
            $.post('./delete.php', JSON.stringify(incomingObjects), function(response) {
                fetchData()
                console.log(response);
            }, 'json');
        }
    }

    fetchData()
    </script>
</body>

</html>
