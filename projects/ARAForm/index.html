<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Client and Appliance Information</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #cfcfcf;
            padding: 20px;
            color: #000;
        }
        h1 {
            color: #000;
        }
        form {
            max-width: 800px;
            margin: 20px auto;
        }

        form > div > * {
            height: 60px;
        }
        form > div > img {
            margin-right: 10px;
        }

        form > div {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        input[type="text"], input[type="email"], input[type="datetime-local"],textarea, select {
            width: 100%;
            max-width: 800px;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 4px;
            transition: border-color 0.3s;
            font-size: large;
        }
        input[type="datetime-local"] {
            -webkit-appearance: none;
        }
        input[type="text"]:focus, input[type="email"]:focus, textarea:focus, select:focus {
            border-color: #0056b3;
        }

        .button {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 3px solid #0056b3;
            font-size: large;
        }

        .submit {
            background-color: #007bff;
            color: white;
        }
        .reprompt {
            background-color: #999;
            border-color: #888;
            color: white;
        }
        .submit:hover {
            background-color: #0056b3;
        }
        .reprompt:hover {
            background-color: #888;
        }

        ::placeholder {
            color: black;
            font-style: bold;
            font-size: large;
            opacity: 1; /* Firefox */
        }

        .incomingContainer {
            max-width: 100%;
            display: flex;
            flex-wrap: wrap;

        }

        .incomingItemContainer {
            max-width: 300px;
            margin: 15px;
            display: flex;
            flex-direction: column;
        }

        .incomingItem {
            max-width: 300px;
            max-height: 200px;
            width: 300px;
            height: 200px;
            border-radius: 15px;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            border: 7px solid #fafafa;
        }

        .incomingItem:hover {
            background-color: #fafafa;
            border-color: #aaa;
        }

        .deleteButton {
            margin-top: 10px;
            text-decoration: underline;
            text-align: center;
            background-color: #999;
            border-color: #888;
            color: white;
        }
        .deleteButton:hover {
            font-weight: bold;
            background-color: #888;
        }

        .searchBar {
            margin: auto;
            max-width: 800px;
            width: 100%;
        }

        .resultsList {
            padding: 0 !important;
            margin: 0 !important;
            width: 100%;
            list-style-type: none;
        }
        .resultsList > li {
            background-color: #efefef;
            font-weight: bold;
            margin-top: -1px;
            border: 1px solid #a7a7a7;
            cursor: pointer;
        }
        .resultsList > li:hover {
            filter: brightness(0.97);
        }
        .resultsList > li > div {
            padding: 12px;
        }
    </style>
</head>

<body>
    <h1>Client Information Form</h1>
    <div class="form-container">
        <form id="dataForm">
            <div class="" id="clientName">
                <img src="./img/user.png">
                <input type="text" name="clientName" placeholder="Client Name" onkeyup="fuzzySearch(this.value)" required>
                <input type="text" name="clientLastName" placeholder="Client Last Name" onfocus="closeFuzzySearch()">
            </div>
            <ul id="resultsList" class="resultsList">
            </ul>
            <div class="">
                <img src="./img/call.png">
                <input type="text" name="clientPhoneNumber" placeholder="Client Phone Number" onfocus="closeFuzzySearch()" required>
            </div>
            <div class="">
                <img src="./img/home.png">
                <input type="text" name="clientAddress" placeholder="Client Address" required>
            </div>
            <div class="">
                <div style="padding: 0 35px;"></div>
                <input type="text" name="clientCity" placeholder="Client City" required>
                <input type="text" name="clientZip" placeholder="Client Zip" required>
            </div>
            <div class="">
                <img src="./img/notepad.png">
                <textarea name="gateCode" placeholder="Gate Code/User Notes"></textarea>
            </div>
            <div class="">
                <img src="./img/laundry.png">
                <input type="text" name="applianceType" placeholder="Appliance Type">
            </div>
            <div class="">
                <img src="./img/tag.png">
                <input type="text" name="applianceBrandName" placeholder="Appliance Brand Name" required>
            </div>
            <div class="">
                <img src="./img/barcode-scanner.png">
                <input type="text" name="applianceModelNumber" placeholder="Appliance Model Number" required>
            </div>
            <!-- GPT PROMPT TO PERPLEXITY -->
            <div class="">
                <img src="./img/command-line.png">
                <textarea name="appliancePrompt" id="appliancePrompt" placeholder="Write the client symptoms here like: 'It is not draining...' 'The broiler is not getting hot...'" style="height: 100px;"></textarea>
            </div>
            <!-- PPLX RESPONSE -->
            <div class="">
                <img src="./img/calendar-date.png">
                <input type="datetime-local" name="jobDateTime" placeholder="Job Date and Time" required>
            </div>
            <div class="">
                <img src="./img/notepad.png">
                <textarea name="repairNotes" placeholder="Repair Notes"></textarea>
            </div>
            <button class="submit button" type="button" onclick="submitData()">Submit</button>
        </form>
        <div class="searchBar">
            <input type="text" id="myInput" onkeyup="fuzzySearch(this.value)" placeholder="Search for previous clients.." title="Type in a name">
        </div>
    </div>
    <div class="incomingContainer" id="incomingContainer"></div>
    <script>
    var incomingObjects;
    const container = document.getElementById("incomingContainer");
    const formChildren = document.getElementById("dataForm").children;
    const resultsList = document.getElementById("resultsList");
    var fuseArray, debug = false;;

    function createPromptMadlib() {
        //Im having issue with my [Brand Name] [Appliance Type] [Model Number] it is [Symptoms]
        let brandName = formChildren[7].children.applianceBrandName.value == "" ? "[Brand Name]" : formChildren[7].children.applianceBrandName.value;
        let applianceType = formChildren[6].children.applianceType.value == "" ? "[Appliance]" : formChildren[6].children.applianceType.value;
        let applianceModelNumber = formChildren[8].children.applianceModelNumber.value == "" ? "[Model Number]" : formChildren[8].children.applianceModelNumber.value;
        let symtpoms = formChildren[9].children.appliancePrompt.value;

        return "Im having issues with my " + brandName + " " + applianceType + " " + applianceModelNumber + ". " + symtpoms;
    }

    function fuzzySearch(query) {
        if (query != "") {
            let searchPattern = query;
            let results = fuse.search(searchPattern);
            console.log(results);
            resultsList.innerHTML = "";
            for (let i = 0; i < results.length; i++) {
                let populateItem = document.createElement("li");
                let populateButton = document.createElement("div");
                populateButton.setAttribute("onclick", "populateFormFromClient(" + results[i].refIndex + ")");
                //populateButton.classList.add("button")
                populateButton.innerText = results[i].item.clientName + " " + results[i].item.clientLastName + " " + results[i].item.jobDateTime.substring(0, 10);
                populateItem.appendChild(populateButton);
                resultsList.appendChild(populateItem);
            }
        } else {
            closeFuzzySearch()
        }
    }

    function closeFuzzySearch() {
        resultsList.innerHTML = "";
    }

    $.fn.serializeObject = function() {
        let o = {};
        let a = this.serializeArray();
        $.each(a, function() {
            if (o[this.name]) {
                if (!o[this.name].push) {
                    o[this.name] = [o[this.name]];
                }
                o[this.name].push(this.value || '');
            } else {
                o[this.name] = this.value || '';
            }
        });
        return o;
    };

    function fetchData() {
        $.get('fetchJSON.php', function(data) {
            incomingObjects = data;
            container.innerHTML = "";
            displayData();
        });
        $.get('fetchClientsJSON.php', function(data) {
            fuseOptions = {
                // isCaseSensitive: false,
                // includeScore: false,
                // shouldSort: true,
                // includeMatches: false,
                findAllMatches: true,
                // minMatchCharLength: 1,
                // location: 0,
                threshold: 0.7,
                // distance: 100,
                // useExtendedSearch: false,
                // ignoreLocation: false,
                // ignoreFieldNorm: false,
                // fieldNormWeight: 1,
                keys: [
                    "clientName",
                    "clientLastName"
                ]
            };
            fuse = new Fuse(data, fuseOptions);
        });
    }

    function displayData() {
        for (let i = 0; i < incomingObjects.length; i++) {
            let sendName = incomingObjects[i].name == null ? "Null" : incomingObjects[i].name
            createIncomingItem(sendName, incomingObjects[i].phone, i)
        }
    }

    function submitData() {
        $.ajaxSetup({
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        });
        let tempObj = $('#dataForm').serializeObject();
        //Add 2 hours to start time and store as a variable
        tempObj.endTime = tempObj.jobDateTime.substring(0, 11) + (parseInt(tempObj.jobDateTime.substring(11, 13)) + 2) + tempObj.jobDateTime.substring(13);
        //Set client state
        tempObj.clientState = "FL";
        //Create Prompt
        tempObj.appliancePrompt = createPromptMadlib();


        let toForward = JSON.stringify(tempObj);

        $.post('./submit.php', toForward, function(response) {
            console.log(response);
            console.log("submit")
        }, 'json');
        tempObj.applianceSolution = "";
        if (!debug) {
            $.post('./storeClient.php', toForward, function(response) {
                console.log(response);
                console.log("client")
            }, 'json');
        }
        document.getElementById("dataForm").reset()
        alert("Data submitted");
    }

    function populateForm(index) {
        formChildren[0].children.clientName.value = incomingObjects[index].name == null ? "Null" : incomingObjects[index].name;
        formChildren[2].children.clientPhoneNumber.value = incomingObjects[index].phone;
        //formChildren[2].children.clientAddress.value = incomingObjects[index].address;
        formChildren[6].children.applianceType.value = incomingObjects[index].appliance;
        formChildren[7].children.applianceBrandName.value = incomingObjects[index].brand;
        formChildren[8].children.applianceModelNumber.value = incomingObjects[index].modelNumber;
        formChildren[9].children.appliancePrompt.value = incomingObjects[index].initialPrompt;
        // formChildren.jobDateTime = x[index].bookingDate;
        //'2024-08-08T11:00'
    }

    function populateFormFromClient(index) {
        formChildren[0].children.clientName.value = fuse._docs[index].clientName;
        formChildren[0].children.clientLastName.value = fuse._docs[index].clientLastName;
        formChildren[2].children.clientPhoneNumber.value = fuse._docs[index].clientPhoneNumber;
        formChildren[3].children.clientAddress.value = fuse._docs[index].clientAddress;
        formChildren[4].children.clientZip.value = fuse._docs[index].clientZip;
        formChildren[4].children.clientCity.value = fuse._docs[index].clientCity;
        formChildren[6].children.applianceType.value = fuse._docs[index].applianceType;
        formChildren[7].children.applianceBrandName.value = fuse._docs[index].applianceBrandName;
        formChildren[8].children.applianceModelNumber.value = fuse._docs[index].applianceModelNumber;
        formChildren[9].children.appliancePrompt.value = fuse._docs[index].appliancePrompt;
        closeFuzzySearch();
    }

    function createIncomingItem(name, number, index) {
        let newContainer = document.createElement("div");
        let newDiv = document.createElement("div");
        let newHeading = document.createElement("h1");
        let newText = document.createElement("p");
        let deleteButton = document.createElement("div");
        deleteButton.classList.add("deleteButton");
        deleteButton.classList.add("button")
        deleteButton.setAttribute("onclick", "deleteItem(" + index + ");");
        //deleteButton.addEventListener("click", deleteItem(index));
        deleteButton.innerHTML = "Delete";
        newDiv.setAttribute("index", index);
        newDiv.classList.add("incomingItem");
        newDiv.setAttribute("onclick", "populateForm(" + index + ");");
        //newDiv.addEventListener("click", populateForm(index));
        newHeading.innerHTML = name;
        newText.innerHTML = number;
        newDiv.appendChild(newHeading);
        newDiv.appendChild(newText);
        newContainer.classList.add("incomingItemContainer");
        newContainer.appendChild(newDiv);
        newContainer.appendChild(deleteButton);
        container.appendChild(newContainer);
    }

    function deleteItem(index, event) {
        //event.stopPropagation();
        $.ajaxSetup({
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        });
        if (window.confirm("Are you sure you want to delete this item?")) {
            console.log("delete " + index)
            incomingObjects.splice(index, 1);
            $.post('./delete.php', JSON.stringify(incomingObjects), function(response) {
                fetchData()
                console.log(response);
            }, 'json');
        }
    }

    fetchData()
    </script>
</body>

</html>
