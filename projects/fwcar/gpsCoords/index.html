var toDisplay = gpsData,
    dataTab = document.getElementById("table"),
    lth = true;
addTableData();
//https://myfwc.maps.arcgis.com/apps/View/index.html?appid=4675e1db32ac43a9a4308e757965d17d
function sortBetweenLat(low, high) {
    low = document.getElementById("lowLat").value, high = document.getElementById("highLat").value;
    toDisplay = [];
    for (let i = 0; i < gpsData.length; i++) {
        if (gpsData[i].lat.substring(0, 2) >= low && gpsData[i].lat.substring(0, 2) <= high) {
            toDisplay.push(gpsData[i]);
        }
    }
    addTableData();
}

function sortDepth() {
    toDisplay = bubbleSort(toDisplay);
    if (lth) {
        toDisplay.reverse();
    }
    addTableData();
}

function bubbleSort(arr) {
    var len = arr.length;
    for (var i = len - 1; i >= 0; i--) {
        for (var j = 1; j <= i; j++) {
            if (parseInt(arr[j - 1].depth) > parseInt(arr[j].depth)) {
                var temp = arr[j - 1];
                arr[j - 1] = arr[j];
                arr[j] = temp;
            }
        }
    }
    return arr;
}

function addTableData() {
    dataTab.innerHTML = "<tr id='headers'><th>Name</th><th>Tons</th><th>Depth</th><th>Releif</th><th>Latitude</th><th>Longitude</th></tr>";
    for (let i = 0; i < toDisplay.length; i++) {
        let x = dataTab.insertRow(1),
            y1 = x.insertCell(0),
            y2 = x.insertCell(1),
            y3 = x.insertCell(2),
            y4 = x.insertCell(3),
            y5 = x.insertCell(4),
            y6 = x.insertCell(5);
        x.classList.add("centerData");
        y1.classList.add("nameData");
        y1.innerHTML = toDisplay[i].nameData;
        y2.innerHTML = toDisplay[i].tons;
        y3.innerHTML = toDisplay[i].depth;
        y4.innerHTML = toDisplay[i].relief;
        y5.innerHTML = toDisplay[i].lat;
        y6.innerHTML = toDisplay[i].lon;
    }
}
function flipLTH() {
	lth = !lth;
	if(!lth)
		document.getElementById('flipflop').innerHTML = "H -> L";
	else
		document.getElementById('flipflop').innerHTML = "L -> H";
}
