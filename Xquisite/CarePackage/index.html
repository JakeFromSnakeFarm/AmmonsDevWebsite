<script type="text/javascript">
var doc = new jsPDF();

$("input[type=checkbox]").parent().parent().children(".notes-area").hide();
$("input[type=checkbox]").change(
    function() {
        if (this.checked) {
            $(this).parent().parent().children(".notes-area").show();
        } else {
            $(this).parent().parent().children(".notes-area").hide();
        }
    }
)

function photoUpload(label, input) {

    input.click();
    label.value = "";
    $("input[type=file]").change(
        function() {
            label.style.backgroundImage = "url(" + window.URL.createObjectURL(input.files[0]) + ")";
        }
    )
}


var imgData,
    heightCount = -180,
    leftMargin = 10;

async function getBase64(url, prompt, notes) {
    const data = await fetch(url);
    const blob = await data.blob();
    const reader = new FileReader();
    //console.log(blob)
    let myPromise = new Promise(function(resolve) {
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
            resolve([reader.result, prompt, notes]);
        }
    })
    return myPromise;
}

async function generatePDF() {
    doc = new jsPDF();
    const promises = [];
    for (let i = 0; i < $(".main-box").children().children().children().length; i += 5) {
        let prompt = $(".main-box").children().children().children()[i].innerHTML;
        let notes = $(".main-box").children().children().children()[i + 2].value;
        let image = "";
        //if ($(".main-box").children().children().children()[i + 3].files.length > 0) {
        image = window.URL.createObjectURL($(".main-box").children().children().children()[i + 3].files[0]);
        //}

        promises.push(getBase64(image, prompt, notes));
        //let base64Data = getBase64(image);
        //writeIterations++;
        //base64Data.then(function(base64) {
        //    writeToPDF(prompt, notes, base64)
        //})
    }
    Promise.all(promises)
        .then((results) => {
            console.log("All done", results);
            for(let i = 0; i<results.length;i++) {
                writeToPDF(results[i][1], results[i][2], results[i][0]);
            }
            doc.save();
        })
        .catch((e) => {
            // Handle errors here
        });
}

function writeToPDF(prompt, notes, imageData) {
    if (heightCount + 345 > doc.internal.pageSize.height) {
        doc.addPage();
        heightCount = -180;
    }
    heightCount += 190;
    doc.text(prompt, leftMargin, heightCount);
    heightCount += 5;
    doc.text(notes, leftMargin, heightCount);
    heightCount += 5;
    doc.addImage(imageData, 'JPEG', leftMargin, heightCount, 160, 90, null, 'NONE', 210);

}
