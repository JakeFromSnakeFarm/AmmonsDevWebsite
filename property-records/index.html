<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Property Manager - Repairs & Issues</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-main">
            <h1 class="app-title">Repairs & Issues</h1>
            <button id="btn-new" class="btn btn-primary">New Item</button>
            <button id="theme-toggle" class="btn btn-secondary" style="margin-left:auto" aria-pressed="false" aria-label="Toggle dark mode">Dark mode</button>
        </div>
        <div class="header-sub">
            <div class="filters">
                <select id="filter-status" aria-label="Filter by status">
                    <option value="">All Statuses</option>
                    <option>new</option>
                    <option>triaged</option>
                    <option>scheduled</option>
                    <option>in_progress</option>
                    <option>awaiting_parts</option>
                    <option>on_hold</option>
                    <option>completed</option>
                    <option>closed</option>
                    <option>won’t_fix</option>
                </select>
                <select id="filter-category" aria-label="Filter by category">
                    <option value="">All Categories</option>
                    <option>plumbing</option>
                    <option>electrical</option>
                    <option>HVAC</option>
                    <option>appliance</option>
                    <option>structural</option>
                    <option>pest</option>
                    <option>paint</option>
                    <option>misc</option>
                </select>
                <select id="filter-priority" aria-label="Filter by priority">
                    <option value="">All Priorities</option>
                    <option>urgent</option>
                    <option>high</option>
                    <option>normal</option>
                    <option>low</option>
                </select>
            </div>
            <div id="metrics" class="metrics" aria-live="polite">
                <div class="metric-box">
                    <div class="metric-title">Money Saved</div>
                    <div id="metric-saved" class="metric-value">$0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-title">Reimbursed Cost Per Day</div>
                    <div id="metric-perday" class="metric-value">$0.00</div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div id="cards" class="cards-root" aria-live="polite"></div>
    </main>

    <template id="card-template">
        <article class="card" tabindex="0">
            <div class="card-thumb" aria-hidden="true">
                <img alt="">
            </div>
            <div class="card-line1">
                <span class="badge priority"></span>
                <span class="badge status"></span>
                <span class="badge category"></span>
            </div>
            <h3 class="title"></h3>
            <p class="desc"></p>
            <div class="card-line2">
                <span class="room"></span>
                <span class="due"></span>
            </div>
            <div class="card-line3">
                <span class="est"></span>
                <span class="reimb badge" style="display:none">Reimb</span>
            </div>
        </article>
    </template>

    <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-panel">
            <header class="modal-header">
                <h2 id="modal-title">Edit Item</h2>
                <div class="save-indicator" id="save-indicator" aria-live="polite"></div>
                <button class="btn btn-icon" id="btn-close" aria-label="Close" data-close>&times;</button>
            </header>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-grid">
                    <label>Title
                        <input id="title" type="text" required maxlength="120">
                    </label>
                    <label class="span-2">Description
                        <textarea id="description" rows="5" placeholder="Details..."></textarea>
                    </label>
                    <label>Priority
                        <select id="priority" required>
                            <option>normal</option>
                            <option>low</option>
                            <option>high</option>
                            <option>urgent</option>
                        </select>
                    </label>
                    <label>Status
                        <select id="status" required>
                            <option>new</option>
                            <option>triaged</option>
                            <option>scheduled</option>
                            <option>in_progress</option>
                            <option>awaiting_parts</option>
                            <option>on_hold</option>
                            <option>completed</option>
                            <option>closed</option>
                            <option>won’t_fix</option>
                        </select>
                    </label>
                    <label>Category
                        <select id="category" required>
                            <option>misc</option>
                            <option>plumbing</option>
                            <option>electrical</option>
                            <option>HVAC</option>
                            <option>appliance</option>
                            <option>structural</option>
                            <option>pest</option>
                            <option>paint</option>
                        </select>
                    </label>
                    <label>Room / Location
                        <input id="room" type="text" placeholder="kitchen, bath, roof, etc.">
                    </label>
                    <label>Reported By
                        <input id="reported_by" type="text" placeholder="name/contact">
                    </label>
                    <label>Next Action
                        <input id="next_action" type="text" placeholder="e.g., Schedule access">
                    </label>
                    <label>Due By (optional)
                        <input id="due_by" type="date">
                    </label>
                    <div id="resolution-wrap" class="span-2" style="display:none">
                        <label>Resolution
                            <textarea id="resolution" rows="4" placeholder="What was done to resolve this?"></textarea>
                        </label>
                    </div>
                    <div class="meta span-2">
                        <div><strong>Created:</strong> <span id="created_at"></span></div>
                        <div><strong>Updated:</strong> <span id="updated_at"></span></div>
                    </div>
                </div>

                <section class="images">
                    <div class="images-header">
                        <h3>Images</h3>
                        <label class="btn btn-secondary">
                            Upload Images
                            <input id="image-input" type="file" accept="image/*" multiple hidden>
                        </label>
                    </div>
                    <div id="image-grid" class="image-grid"></div>
                </section>

                <section class="costs">
                    <h3>Costs</h3>
                    <div class="form-grid">
                        <label>Labor Time (hours)
                            <input id="labor_time" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0">
                        </label>
                        <label>Labor Cost Estimate (per hour)
                            <input id="labor_cost_estimate" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
                        </label>
                        <label>Parts Cost
                            <input id="parts_cost" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
                        </label>
                        <label>Estimated Price
                            <input id="estimated_price" type="text" readonly>
                        </label>
                        <label>
                            <input id="asking_for_reimbursement" type="checkbox"> Asking for reimbursement
                        </label>
                        <label id="my_cost_wrap" style="display:none">My Cost
                            <input id="my_cost" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
                        </label>
                    </div>
                </section>

                <footer class="modal-actions">
                    <button type="button" id="btn-delete" class="btn btn-danger">Delete</button>
                    <div class="spacer"></div>
                    <button type="submit" class="btn btn-primary">Save</button>
                </footer>
            </form>
        </div>
    </div>

    <div id="viewer" class="viewer" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="viewer-backdrop" data-close></div>
        <div class="viewer-panel">
            <button class="btn btn-icon viewer-close" aria-label="Close image" data-close>&times;</button>
            <img id="viewer-img" alt="" />
        </div>
    </div>

    <script src="./app.js" defer></script>
</body>
</html>
